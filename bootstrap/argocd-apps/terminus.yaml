apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: terminus
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/CoultonF/homelab
    targetRevision: main
    path: apps/terminus
  destination:
    server: https://kubernetes.default.svc
    namespace: terminus
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
