apiVersion: apps/v1
kind: Deployment
metadata:
  name: terminus
  namespace: terminus
  labels:
    app.kubernetes.io/name: terminus
    app.kubernetes.io/component: web
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: terminus
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: terminus
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: terminus
          image: ghcr.io/usetrmnl/terminus:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 2300
              protocol: TCP
          env:
            - name: TZ
              value: "America/Vancouver"
            - name: HANAMI_PORT
              value: "2300"
            - name: API_URI
              value: "https://trmnl.coultonf.com"
            # Runs DB migrations/setup on boot
            - name: APP_SETUP
              value: "true"
            - name: APP_SECRET
              valueFrom:
                secretKeyRef:
                  # Created out-of-band; see README.md
                  name: terminus-app-secret
                  key: APP_SECRET
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  # Generated by CloudNativePG for the terminus-postgres cluster
                  name: terminus-postgres-app
                  key: password
            - name: DATABASE_URL
              value: "postgres://terminus:$(DB_PASSWORD)@terminus-postgres-rw:5432/terminus"
            - name: KEYVALUE_URL
              value: "redis://terminus-keyvalue:6379/0"
          volumeMounts:
            - name: uploads
              mountPath: /app/public/uploads
            - name: fonts
              mountPath: /app/public/fonts
            - name: fonts
              mountPath: /usr/share/fonts/terminus
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /up
              port: 2300
            initialDelaySeconds: 45
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /up
              port: 2300
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: terminus-uploads
        - name: fonts
          persistentVolumeClaim:
            claimName: terminus-fonts
