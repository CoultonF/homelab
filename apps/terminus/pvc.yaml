apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: terminus-uploads
  namespace: terminus
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: local-path
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: terminus-fonts
  namespace: terminus
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: local-path
