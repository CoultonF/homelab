apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: terminus-keyvalue-data
  namespace: terminus
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: local-path
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: terminus-keyvalue
  namespace: terminus
  labels:
    app.kubernetes.io/name: terminus-keyvalue
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: terminus-keyvalue
  template:
    metadata:
      labels:
        app.kubernetes.io/name: terminus-keyvalue
    spec:
      containers:
        - name: valkey
          image: valkey/valkey:9-alpine
          args:
            - valkey-server
            - --maxmemory
            - 256mb
            - --maxmemory-policy
            - noeviction
          ports:
            - name: redis
              containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: terminus-keyvalue-data
---
apiVersion: v1
kind: Service
metadata:
  name: terminus-keyvalue
  namespace: terminus
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: terminus-keyvalue
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
