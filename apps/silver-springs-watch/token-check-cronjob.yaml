apiVersion: batch/v1
kind: CronJob
metadata:
  name: silver-springs-token-check
  namespace: silver-springs-watch
  labels:
    app.kubernetes.io/name: silver-springs-watch
    app.kubernetes.io/component: token-check
spec:
  schedule: "30 8 * * *"
  timeZone: America/Edmonton
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 180
      template:
        metadata:
          labels:
            app.kubernetes.io/name: silver-springs-watch
            app.kubernetes.io/component: token-check
        spec:
          restartPolicy: OnFailure
          tolerations:
            - effect: NoSchedule
              key: node-role.kubernetes.io/control-plane
              operator: Exists
          containers:
            - name: token-check
              image: python:3.12-slim
              command: ["sh", "-c"]
              args:
                - |
                  set -e
                  pip install --quiet --no-cache-dir requests
                  python3 /app/token_check.py
              env:
                - name: HOUSE_SIGMA_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: silver-springs-secrets
                      key: house-sigma-token
                - name: SMTP_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: silver-springs-secrets
                      key: smtp-password
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  memory: 256Mi
              volumeMounts:
                - name: script
                  mountPath: /app
                  readOnly: true
                - name: state
                  mountPath: /state
          volumes:
            - name: script
              configMap:
                name: watcher-script
                defaultMode: 0555
            - name: state
              persistentVolumeClaim:
                claimName: silver-springs-state
