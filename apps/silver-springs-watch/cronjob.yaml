apiVersion: batch/v1
kind: CronJob
metadata:
  name: silver-springs-watch
  namespace: silver-springs-watch
  labels:
    app.kubernetes.io/name: silver-springs-watch
spec:
  schedule: "5 * * * *"
  timeZone: America/Edmonton
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: silver-springs-watch
        spec:
          restartPolicy: OnFailure
          tolerations:
            - effect: NoSchedule
              key: node-role.kubernetes.io/control-plane
              operator: Exists
          containers:
            - name: watcher
              image: node:20-slim
              command: ["sh", "-c"]
              args:
                - |
                  set -e
                  apt-get update -qq
                  apt-get install -y -qq python3 python3-requests ca-certificates curl >/dev/null
                  npm i -g --silent @openai/codex
                  python3 /app/watcher.py
              env:
                - name: OPENAI_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: silver-springs-secrets
                      key: openai-api-key
                - name: SMTP_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: silver-springs-secrets
                      key: smtp-password
                - name: HOUSESIGMA_URL
                  valueFrom:
                    secretKeyRef:
                      name: silver-springs-secrets
                      key: housesigma-url
                - name: HOUSESIGMA_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: silver-springs-secrets
                      key: housesigma-token
                - name: SILVER_SPRINGS_AREA_CODE
                  valueFrom:
                    secretKeyRef:
                      name: silver-springs-secrets
                      key: silver-springs-area-code
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 1Gi
              volumeMounts:
                - name: script
                  mountPath: /app
                  readOnly: true
                - name: state
                  mountPath: /state
          volumes:
            - name: script
              configMap:
                name: watcher-script
                defaultMode: 0555
            - name: state
              persistentVolumeClaim:
                claimName: silver-springs-state
