apiVersion: v1
kind: ConfigMap
metadata:
  name: watcher-script
  namespace: silver-springs-watch
data:
  PROMPT.md: |
    You are a deterministic data extractor. Do not narrate.

    Task: query the HouseSigma iOS API and return current real-estate listings
    in the Silver Springs neighbourhood of Calgary.

    Use the following environment values (already exported in your shell):
      - HOUSESIGMA_URL              base endpoint URL
      - HOUSESIGMA_TOKEN            bearer token (send as `Authorization: Bearer $HOUSESIGMA_TOKEN`)
      - SILVER_SPRINGS_AREA_CODE    HouseSigma area code / polygon id for Silver Springs

    Steps:
      1. Issue an HTTPS GET (use `curl` or any http client available in your sandbox)
         to $HOUSESIGMA_URL filtered to area $SILVER_SPRINGS_AREA_CODE.
         Send `Authorization: Bearer $HOUSESIGMA_TOKEN`.
         Send a realistic iOS User-Agent header.
      2. Parse the response. Keep only listings in Silver Springs (Calgary, AB).
      3. Emit ONLY a JSON array on stdout. No markdown, no prose, no code fences.
         Schema per element:
           {
             "id":      string,   // MLS number or HouseSigma listing id (stable per listing)
             "price":   integer,  // CAD whole dollars
             "beds":    integer,
             "baths":   number,   // 2.5 etc
             "address": string,
             "url":     string    // canonical HouseSigma listing URL
           }
      4. If the API returns an error or zero listings, emit `[]` (an empty JSON array).
      5. Never invent listings. If you cannot reach the API, emit `[]`.

    Output rule: the FIRST and ONLY non-whitespace content on stdout must be a
    JSON array. Anything else will cause the surrounding pipeline to fail.

  watcher.py: |
    #!/usr/bin/env python3
    import json
    import os
    import re
    import smtplib
    import subprocess
    import sys
    from email.mime.multipart import MIMEMultipart
    from email.mime.text import MIMEText
    from pathlib import Path

    STATE = Path("/state/seen.json")
    PROMPT = Path("/app/PROMPT.md").read_text()
    SMTP_USER = "cjrfraser@gmail.com"
    SMTP_PASSWORD = os.environ["SMTP_PASSWORD"]

    def fetch():
        result = subprocess.run(
            ["codex", "exec", "--quiet", PROMPT],
            capture_output=True, text=True, timeout=180,
        )
        if result.returncode != 0:
            sys.stderr.write(f"codex exit {result.returncode}\n{result.stderr}\n")
            sys.exit(1)
        match = re.search(r"\[.*\]", result.stdout, re.DOTALL)
        if not match:
            sys.stderr.write(f"no JSON array in codex stdout:\n{result.stdout}\n")
            sys.exit(1)
        return json.loads(match.group(0))

    def load_seen():
        if not STATE.exists():
            return set()
        return set(json.loads(STATE.read_text()))

    def save_seen(ids):
        STATE.parent.mkdir(parents=True, exist_ok=True)
        STATE.write_text(json.dumps(sorted(ids)))

    def render_email(new_listings):
        rows = "".join(
            f'<tr>'
            f'<td><a href="{l["url"]}">{l["address"]}</a></td>'
            f'<td>${l["price"]:,}</td>'
            f'<td>{l["beds"]} bd</td>'
            f'<td>{l["baths"]} ba</td>'
            f'</tr>'
            for l in new_listings
        )
        return (
            "<html><body>"
            f"<p>{len(new_listings)} new Silver Springs listing(s):</p>"
            "<table border='1' cellpadding='6' cellspacing='0'>"
            "<tr><th>Address</th><th>Price</th><th>Beds</th><th>Baths</th></tr>"
            f"{rows}</table></body></html>"
        )

    def send_email(html, count):
        msg = MIMEMultipart("alternative")
        msg["Subject"] = f"Silver Springs: {count} new listing(s)"
        msg["From"] = SMTP_USER
        msg["To"] = SMTP_USER
        msg.attach(MIMEText(html, "html"))
        with smtplib.SMTP("smtp.gmail.com", 587) as s:
            s.starttls()
            s.login(SMTP_USER, SMTP_PASSWORD)
            s.send_message(msg)

    def main():
        current = fetch()
        seen = load_seen()
        new = [l for l in current if l.get("id") and l["id"] not in seen]
        if new:
            send_email(render_email(new), len(new))
            print(f"emailed {len(new)} new listing(s)")
        else:
            print("no new listings")
        save_seen(seen | {l["id"] for l in current if l.get("id")})

    if __name__ == "__main__":
        main()
