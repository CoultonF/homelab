apiVersion: v1
kind: ConfigMap
metadata:
  name: watcher-script
  namespace: silver-springs-watch
data:
  watcher.py: |
    #!/usr/bin/env python3
    """Hourly Calgary Silver Springs new-listing watcher.

    Talks to the HouseSigma iOS API at api.housesigma.com:

      1. POST /init/accesstoken/check                 -> session secret_key
         (returns {data.secret.secret_key, expired_at})

      2. POST /search/mapsearchv3/listing             -> clusters/markers
         Plain bearer-token auth, form-encoded body. Filters by
         (lat1,lat2,lon1,lon2) bbox + listing_days, returns id_listing
         clusters with no detail fields.

      3. POST /listing/preview/many                   -> full listing data
         AES-CTR + RSA-OAEP encrypted body. Key = first 16 bytes of
         secret_key (UTF-8). Counter is RSA-OAEP encrypted with
         HouseSigma's public RSA key. Response is gzip(json) encrypted
         with the same AES key/counter. Returns ml_num, id_address,
         seo_address, community_name, address, price, beds, washrooms,
         photo_url, etc.

    The watcher then filters preview results by community_name == "Silver
    Springs", diffs ids against /state/seen.json, and emails new entries
    with canonical HouseSigma URLs.
    """
    import base64
    import gzip
    import json
    import os
    import smtplib
    import sys
    import time
    from email.mime.multipart import MIMEMultipart
    from email.mime.text import MIMEText
    from pathlib import Path

    import requests
    from cryptography.hazmat.primitives import hashes, serialization
    from cryptography.hazmat.primitives.asymmetric import padding
    from cryptography.hazmat.primitives.ciphers import Cipher, algorithms, modes

    BASE = "https://api.housesigma.com/bkv2/api"
    HS_TOKEN = os.environ["HOUSE_SIGMA_TOKEN"]
    SMTP_PASSWORD = os.environ["SMTP_PASSWORD"]
    SMTP_USER = "cjrfraser@gmail.com"

    PUBKEY_PEM = (
        b"-----BEGIN PUBLIC KEY-----\n"
        b"MIGfMA0GCSqGSIb3DQEBAQUAA4GNADCBiQKBgQDQlOcjEbqprurl2xjoEP0QdjGI\n"
        b"rZhLVn5vzwCorG4+2AtSi4AAHjghSXM//ljqE5rA13gfTc58JvM6I75Dmqr5r5Vv\n"
        b"o57CAbxBXHsXu5ojtgvb5rOd2lrZeckwJL0Z7euvRsA/FjbFdGMcGeSJ8JoePq+H\n"
        b"0RFOt285bSb8hVq0LQIDAQAB\n"
        b"-----END PUBLIC KEY-----\n"
    )

    SILVER_SPRINGS = {
        "lat1": 51.135,
        "lat2": 51.100,
        "lon1": -114.225,
        "lon2": -114.170,
        "zoom": 14.5,
    }
    SILVER_SPRINGS_NAME = "Silver Springs"
    LISTING_DAYS = 7

    BASE_HEADERS = {
        "User-Agent": (
            "HouseSigma Prod/7.35.0 (com.housesigma.ios; build:253; iOS 26.4.0) "
            "Alamofire/5.6.4"
        ),
        "Authorization": f"Bearer {HS_TOKEN}",
        "hs-client-type": "ios_native",
        "hs-client-version": "7.35.0",
        "hs-client-latitude": "51.118",
        "hs-client-longitude": "-114.190",
        "hs-client-location-timestamp": str(int(time.time() * 1000)),
        "accept-language": "en;q=1.0",
        "accept": "*/*",
    }

    STATE = Path("/state/seen.json")


    # --- crypto helpers --------------------------------------------------------

    def aes_key(secret):
        return secret.ljust(16, "*")[:16].encode("utf-8")


    def encrypt_payload(secret, payload):
        key = aes_key(secret)
        counter = os.urandom(16)
        plaintext = json.dumps(payload, separators=(",", ":")).encode("utf-8")
        ct = Cipher(algorithms.AES(key), modes.CTR(counter)).encryptor().update(plaintext)
        pub = serialization.load_pem_public_key(PUBKEY_PEM)
        rsa_ct = pub.encrypt(
            counter,
            padding.OAEP(mgf=padding.MGF1(hashes.SHA1()), algorithm=hashes.SHA1(), label=None),
        )
        body = {
            "ctr": base64.b64encode(rsa_ct).decode("ascii"),
            "et_payload": base64.b64encode(ct).decode("ascii"),
        }
        return body, counter


    def decrypt_response(secret, counter, data_b64):
        key = aes_key(secret)
        ct = base64.b64decode(data_b64)
        raw = Cipher(algorithms.AES(key), modes.CTR(counter)).decryptor().update(ct)
        try:
            return json.loads(gzip.decompress(raw).decode("utf-8"))
        except Exception:
            return json.loads(raw.decode("utf-8"))


    # --- API calls -------------------------------------------------------------

    def get_secret(s):
        r = s.post(
            f"{BASE}/init/accesstoken/check",
            headers={**BASE_HEADERS, "content-type": "application/x-www-form-urlencoded; charset=utf-8"},
            data=f"access_token={HS_TOKEN}&lang=en_US&province=AB",
            timeout=15,
        )
        r.raise_for_status()
        body = r.json()
        if not body.get("status"):
            raise RuntimeError(f"accesstoken/check rejected: {body.get('error')}")
        secret = ((body.get("data") or {}).get("secret") or {}).get("secret_key")
        if not secret:
            raise RuntimeError("no secret_key in accesstoken/check response")
        return secret


    def search_form_body(area):
        return [
            ("bathroom_min", "0"),
            ("bedroom_range[]", "0"),
            ("building_age[]", "999"),
            ("building_age[]", "0"),
            ("de_list_days", "90"),
            ("description", ""),
            ("front_feet[]", "0"),
            ("front_feet[]", "100"),
            ("garage_min", "0"),
            ("house_type[]", "all"),
            ("lang", "en_US"),
            ("lat1", str(area["lat1"])),
            ("lat2", str(area["lat2"])),
            ("list_type[]", "1"),
            ("listing_days", str(LISTING_DAYS)),
            ("listing_type[]", "all"),
            ("lon1", str(area["lon1"])),
            ("lon2", str(area["lon2"])),
            ("lot_size[]", "0"),
            ("lot_size[]", "10000000"),
            ("max_maintenance_fee", "0"),
            ("open_house_date", "0"),
            ("price[]", "0"),
            ("price[]", "6000000"),
            ("province", "AB"),
            ("rental_yield[]", "0.0"),
            ("rental_yield[]", "0.1"),
            ("school_score[]", "0"),
            ("school_score[]", "10"),
            ("show_comparision", "1"),
            ("show_history", "0"),
            ("sold_days", "0"),
            ("square_footage[]", "0"),
            ("square_footage[]", "4000"),
            ("zoom", str(area["zoom"])),
        ]


    def search_cluster_ids(s):
        r = s.post(
            f"{BASE}/search/mapsearchv3/listing",
            headers={**BASE_HEADERS, "content-type": "application/x-www-form-urlencoded; charset=utf-8"},
            data=search_form_body(SILVER_SPRINGS),
            timeout=30,
        )
        r.raise_for_status()
        body = r.json()
        if not body.get("status"):
            raise RuntimeError(f"mapsearchv3/listing rejected: {body.get('error')}")
        items = (body.get("data") or {}).get("list") or []
        ids = []
        for it in items:
            cids = it.get("ids") or []
            if isinstance(cids, str):
                cids = [cids]
            for i in cids:
                if i:
                    ids.append(str(i))
        # dedupe preserving order
        seen = set()
        unique = []
        for i in ids:
            if i not in seen:
                seen.add(i)
                unique.append(i)
        return unique


    def fetch_previews(s, secret, ids):
        if not ids:
            return []
        ts = str(int(time.time()))
        payload = {"id_listing": ids, "hs_request_timestamp": ts}
        body, counter = encrypt_payload(secret, payload)
        r = s.post(
            f"{BASE}/listing/preview/many",
            headers={**BASE_HEADERS, "content-type": "application/json", "Hs-Request-Timestamp": ts},
            json=body,
            timeout=30,
        )
        r.raise_for_status()
        env = r.json()
        if not env.get("status"):
            raise RuntimeError(f"preview/many rejected: {env.get('error')}")
        decoded = decrypt_response(secret, counter, env["data"])
        return decoded.get("houseList") or []


    # --- email + state ---------------------------------------------------------

    def canonical_url(item):
        seo_addr = item.get("seo_address") or "x"
        seo_muni = item.get("seo_municipality") or "calgary-real-estate"
        province = (item.get("province") or "AB").lower()
        id_address = item.get("id_address") or "x"
        id_listing = item.get("id_listing") or ""
        return (
            f"https://housesigma.com/{province}/{seo_muni}/"
            f"{seo_addr}/home/{id_address}?id_listing={id_listing}"
        )


    def fmt_price(item):
        n = item.get("price_int")
        if isinstance(n, (int, float)) and n:
            return f"${int(n):,}"
        s = item.get("price")
        return f"${s}" if s else "?"


    def render_row(item):
        url = canonical_url(item)
        mls = item.get("ml_num") or item.get("id_listing") or ""
        addr = item.get("address") or ""
        kind = item.get("house_type_name") or ""
        beds = item.get("bedroom_string") or item.get("bedroom") or "?"
        baths = item.get("washroom") or "?"
        return (
            "<tr>"
            f"<td><a href=\"{url}\">{mls}</a></td>"
            f"<td>{addr}</td>"
            f"<td>{kind}</td>"
            f"<td>{fmt_price(item)}</td>"
            f"<td>{beds} bd / {baths} ba</td>"
            "</tr>"
        )


    def render_email(items):
        rows = "".join(render_row(i) for i in items)
        return (
            "<html><body>"
            f"<p>{len(items)} new Silver Springs listing(s) "
            f"(posted in last {LISTING_DAYS} days):</p>"
            "<table border='1' cellpadding='6' cellspacing='0'>"
            "<tr><th>MLS</th><th>Address</th><th>Type</th><th>Price</th><th>Beds/Baths</th></tr>"
            f"{rows}</table>"
            "</body></html>"
        )


    def send_email(html, count):
        msg = MIMEMultipart("alternative")
        msg["Subject"] = f"Silver Springs: {count} new listing(s)"
        msg["From"] = SMTP_USER
        msg["To"] = SMTP_USER
        msg.attach(MIMEText(html, "html"))
        with smtplib.SMTP("smtp.gmail.com", 587) as srv:
            srv.starttls()
            srv.login(SMTP_USER, SMTP_PASSWORD)
            srv.send_message(msg)


    def load_seen():
        if not STATE.exists():
            return set()
        return set(json.loads(STATE.read_text()))


    def save_seen(ids):
        STATE.parent.mkdir(parents=True, exist_ok=True)
        STATE.write_text(json.dumps(sorted(ids)))


    def main():
        s = requests.Session()
        secret = get_secret(s)
        ids = search_cluster_ids(s)
        print(f"bbox returned {len(ids)} candidate id_listings")
        if not ids:
            return

        previews = fetch_previews(s, secret, ids)
        in_silver = [
            i for i in previews
            if (i.get("community_name") or "").strip().lower() == SILVER_SPRINGS_NAME.lower()
        ]
        print(f"{len(in_silver)} of {len(previews)} are in {SILVER_SPRINGS_NAME}")

        seen = load_seen()
        new = [i for i in in_silver if str(i.get("id_listing")) not in seen]
        if new:
            send_email(render_email(new), len(new))
            print(f"emailed {len(new)} new")
        else:
            print("no new listings")
        save_seen(seen | {str(i.get("id_listing")) for i in in_silver if i.get("id_listing")})


    if __name__ == "__main__":
        try:
            main()
        except Exception as e:
            sys.stderr.write(f"watcher failed: {e}\n")
            sys.exit(1)
