apiVersion: v1
kind: ConfigMap
metadata:
  name: watcher-script
  namespace: silver-springs-watch
data:
  watcher.py: |
    #!/usr/bin/env python3
    """Hourly Calgary Silver Springs new-listing watcher.

    Uses the HouseSigma iOS API at api.housesigma.com. The iOS endpoint
    accepts a long-lived bearer token (`HOUSE_SIGMA_TOKEN`) and does not
    require signin, signature, or payload encryption — confirmed by mitmproxy
    capture of the iOS app's traffic.

    Endpoints:
      POST /bkv2/api/search/mapsearchv3/listing  -> clusters/markers with ids
      POST /bkv2/api/search/mapsearchv3/feature  -> featured listings (incl ml_num)

    Each map item carries:
      - location {lat, lon}
      - label    e.g. "D 0.63M" (D=Detached, 0.63M = $630k)
      - ids      [id_listing, ...]
      - ml_num   (only on /feature items)

    Per-listing detail (address, beds, baths) lives behind an AES-encrypted
    endpoint and is intentionally not used here. The email links to the
    HouseSigma webview where the user can see full details.
    """
    import json
    import os
    import smtplib
    import sys
    import time
    from email.mime.multipart import MIMEMultipart
    from email.mime.text import MIMEText
    from pathlib import Path

    import requests

    BASE = "https://api.housesigma.com/bkv2/api"
    HS_TOKEN = os.environ["HOUSE_SIGMA_TOKEN"]
    SMTP_PASSWORD = os.environ["SMTP_PASSWORD"]
    SMTP_USER = "cjrfraser@gmail.com"

    HEADERS = {
        "authorization": f"Bearer {HS_TOKEN}",
        "hs-client-type": "ios_native",
        "hs-client-version": "7.35.0",
        "hs-client-latitude": "51.115",
        "hs-client-longitude": "-114.190",
        "hs-client-location-timestamp": str(int(time.time() * 1000)),
        "user-agent": (
            "HouseSigma Prod/7.35.0 (com.housesigma.ios; build:253; iOS 26.4.0) "
            "Alamofire/5.6.4"
        ),
        "accept-language": "en;q=1.0",
        "accept": "*/*",
        "content-type": "application/x-www-form-urlencoded; charset=utf-8",
    }

    SILVER_SPRINGS = {
        "lat1": 51.130,   # north
        "lat2": 51.105,   # south
        "lon1": -114.215, # west
        "lon2": -114.165, # east
        "zoom": 14.5,
    }

    STATE = Path("/state/seen.json")


    def search_form_body(area):
        # Mirrors the iOS app body — array fields use `key[]=value`.
        # Built as a list of (k, v) pairs so requests urlencodes them correctly.
        return [
            ("bathroom_min", "0"),
            ("bedroom_range[]", "0"),
            ("building_age[]", "999"),
            ("building_age[]", "0"),
            ("de_list_days", "90"),
            ("description", ""),
            ("front_feet[]", "0"),
            ("front_feet[]", "100"),
            ("garage_min", "0"),
            ("house_type[]", "all"),
            ("lang", "en_US"),
            ("lat1", str(area["lat1"])),
            ("lat2", str(area["lat2"])),
            ("list_type[]", "1"),
            ("listing_days", "0"),
            ("listing_type[]", "all"),
            ("lon1", str(area["lon1"])),
            ("lon2", str(area["lon2"])),
            ("lot_size[]", "0"),
            ("lot_size[]", "10000000"),
            ("max_maintenance_fee", "0"),
            ("open_house_date", "0"),
            ("price[]", "0"),
            ("price[]", "6000000"),
            ("province", "AB"),
            ("rental_yield[]", "0.0"),
            ("rental_yield[]", "0.1"),
            ("school_score[]", "0"),
            ("school_score[]", "10"),
            ("show_comparision", "1"),
            ("show_history", "0"),
            ("sold_days", "0"),
            ("square_footage[]", "0"),
            ("square_footage[]", "4000"),
            ("zoom", str(area["zoom"])),
        ]


    def fetch_map_items(s, path, area):
        body = search_form_body(area)
        r = s.post(f"{BASE}{path}", data=body, headers=HEADERS, timeout=30)
        r.raise_for_status()
        resp = r.json()
        if not resp.get("status"):
            raise RuntimeError(f"{path} rejected: {resp.get('error')}")
        data = resp.get("data")
        # /listing returns {"list": [...]}; /feature returns a list directly
        if isinstance(data, list):
            return data
        return (data or {}).get("list") or []


    def collect_listings():
        s = requests.Session()
        merged = {}  # id -> {id, ml_num?, label?, lat, lon}
        for path in ("/search/mapsearchv3/listing", "/search/mapsearchv3/feature"):
            for item in fetch_map_items(s, path, SILVER_SPRINGS):
                ids = item.get("ids") or []
                if isinstance(ids, str):
                    ids = [ids]
                for i in ids:
                    if not i:
                        continue
                    rec = merged.setdefault(i, {"id": i})
                    rec["label"] = item.get("label") or rec.get("label")
                    rec["ml_num"] = item.get("ml_num") or rec.get("ml_num")
                    loc = item.get("location") or {}
                    rec["lat"] = rec.get("lat") or loc.get("lat")
                    rec["lon"] = rec.get("lon") or loc.get("lon")
        return list(merged.values())


    def parse_label_price(label):
        # Examples: "D 0.63M", "V 0.16M", "S 850K", "O 90K"
        if not label:
            return None
        parts = label.split()
        if len(parts) < 2:
            return None
        amt = parts[-1]
        try:
            if amt.endswith("M"):
                return int(float(amt[:-1]) * 1_000_000)
            if amt.endswith("K"):
                return int(float(amt[:-1]) * 1_000)
            return int(amt)
        except ValueError:
            return None


    def parse_label_type(label):
        if not label:
            return ""
        parts = label.split()
        return {
            "D": "Detached",
            "S": "Semi",
            "T": "Townhouse",
            "C": "Condo",
            "V": "Vacant land",
            "O": "Other",
            "R": "Row",
        }.get(parts[0], parts[0])


    def render_row(l):
        url = f"https://housesigma.com/h5/en/listing/{l['id']}"
        price = parse_label_price(l.get("label"))
        price_s = f"${price:,}" if price else (l.get("label") or "?")
        return (
            "<tr>"
            f"<td><a href=\"{url}\">{l.get('ml_num') or l['id']}</a></td>"
            f"<td>{parse_label_type(l.get('label'))}</td>"
            f"<td>{price_s}</td>"
            f"<td>{l.get('lat'):.4f}, {l.get('lon'):.4f}</td>"
            "</tr>"
        ) if l.get("lat") and l.get("lon") else (
            "<tr>"
            f"<td><a href=\"{url}\">{l.get('ml_num') or l['id']}</a></td>"
            f"<td>{parse_label_type(l.get('label'))}</td>"
            f"<td>{price_s}</td>"
            f"<td>?</td>"
            "</tr>"
        )


    def render_email(new_listings):
        rows = "".join(render_row(l) for l in new_listings)
        return (
            "<html><body>"
            f"<p>{len(new_listings)} new Silver Springs listing(s):</p>"
            "<table border='1' cellpadding='6' cellspacing='0'>"
            "<tr><th>MLS / ID</th><th>Type</th><th>Price</th><th>Lat,Lon</th></tr>"
            f"{rows}</table>"
            "<p>Click the MLS / ID to open the HouseSigma listing.</p>"
            "</body></html>"
        )


    def send_email(html, count):
        msg = MIMEMultipart("alternative")
        msg["Subject"] = f"Silver Springs: {count} new listing(s)"
        msg["From"] = SMTP_USER
        msg["To"] = SMTP_USER
        msg.attach(MIMEText(html, "html"))
        with smtplib.SMTP("smtp.gmail.com", 587) as srv:
            srv.starttls()
            srv.login(SMTP_USER, SMTP_PASSWORD)
            srv.send_message(msg)


    def load_seen():
        if not STATE.exists():
            return set()
        return set(json.loads(STATE.read_text()))


    def save_seen(ids):
        STATE.parent.mkdir(parents=True, exist_ok=True)
        STATE.write_text(json.dumps(sorted(ids)))


    def main():
        listings = collect_listings()
        print(f"fetched {len(listings)} listings in Silver Springs bbox")

        seen = load_seen()
        new = [l for l in listings if l["id"] not in seen]
        if new:
            send_email(render_email(new), len(new))
            print(f"emailed {len(new)} new")
        else:
            print("no new listings")
        save_seen(seen | {l["id"] for l in listings})


    if __name__ == "__main__":
        try:
            main()
        except Exception as e:
            sys.stderr.write(f"watcher failed: {e}\n")
            sys.exit(1)
