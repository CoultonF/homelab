apiVersion: v1
kind: ConfigMap
metadata:
  name: watcher-script
  namespace: silver-springs-watch
data:
  watcher.py: |
    #!/usr/bin/env python3
    """Hourly Calgary Silver Springs new-listing watcher.

    HouseSigma bkv2 API flow (matches calgary-home-search/scripts/homes/test_detail_with_login.exs):
      1. POST /init/accesstoken/new                            -> bearer token
      2. POST /init/app  {lang, province}                      -> session init
      3. POST /auth/user/signin {email, pass, login_type, token}
      4. POST /search/mapsearchv3/listing                      -> clusters of id_listing
      5. POST /listing/info/detail_v2 per id                   -> address/price/beds/baths
    """
    import hashlib
    import json
    import os
    import smtplib
    import sys
    import time
    from email.mime.multipart import MIMEMultipart
    from email.mime.text import MIMEText
    from pathlib import Path
    from urllib.parse import quote_plus

    import requests

    API_SALT = "ZckdTeV3kGyZd80q"

    BASE = "https://housesigma.com/bkv2/api"
    BASE_HEADERS = {
        "user-agent": (
            "Mozilla/5.0 (Windows NT 10.0; Win64; x64) "
            "AppleWebKit/537.36 (KHTML, like Gecko) "
            "Chrome/120.0.0.0 Safari/537.36"
        ),
        "origin": "https://housesigma.com",
        "referer": "https://housesigma.com/",
        "HS-Client-Type": "desktop_v7",
        "HS-Client-Version": "7.21.152",
        "content-type": "application/json",
    }
    AUTH_EXTRA = {
        "Hs-Current-URL": "https://housesigma.com/ab/calgary-real-estate/map",
        "HS-Client-Latitude": "51.0447",
        "HS-Client-Longitude": "-114.0719",
    }

    SILVER_SPRINGS_COMMUNITY_ID = 31974
    CALGARY_BBOX = {
        "lat_min": 50.84,
        "lat_max": 51.21,
        "lng_min": -114.32,
        "lng_max": -113.86,
    }

    STATE = Path("/state/seen.json")
    SMTP_USER = "cjrfraser@gmail.com"
    SMTP_PASSWORD = os.environ["SMTP_PASSWORD"]
    HS_EMAIL = os.environ["HOUSE_SIGMA_EMAIL"]
    HS_PASSWORD = os.environ["HOUSE_SIGMA_PASSWORD"]


    def make_session():
        s = requests.Session()
        s.headers.update(BASE_HEADERS)
        return s


    def get_token(s):
        r = s.post(f"{BASE}/init/accesstoken/new", json={}, timeout=15)
        r.raise_for_status()
        body = r.json()
        token = (body.get("data") or {}).get("access_token")
        if not token:
            raise RuntimeError(f"no access_token: {body}")
        return token


    def init_app(s, token):
        r = s.post(
            f"{BASE}/init/app",
            json={"lang": "en_US", "province": "AB"},
            headers={**AUTH_EXTRA, "authorization": f"Bearer {token}"},
            timeout=15,
        )
        r.raise_for_status()


    def signin(s, token):
        r = s.post(
            f"{BASE}/auth/user/signin",
            json={
                "email": HS_EMAIL,
                "pass": HS_PASSWORD,
                "login_type": "normal",
                "token": token,
            },
            headers={**AUTH_EXTRA, "authorization": f"Bearer {token}"},
            timeout=15,
            allow_redirects=False,
        )
        r.raise_for_status()
        body = r.json()
        if not body.get("status"):
            raise RuntimeError(f"signin rejected: {body.get('error')}")


    def sign(data, timestamp):
        # Per test_signed_search.exs:
        # only top-level scalar values, sorted desc by key, urlencoded as k=v,
        # joined with '&', lowercased, then md5(joined + timestamp + salt).
        pairs = []
        for k, v in data.items():
            if isinstance(v, bool):
                continue
            if not isinstance(v, (str, int, float)):
                continue
            pairs.append((str(k), str(v)))
        pairs.sort(key=lambda p: p[0], reverse=True)
        joined = "&".join(f"{quote_plus(k)}={quote_plus(v)}" for k, v in pairs).lower()
        plaintext = joined + timestamp + API_SALT
        return hashlib.md5(plaintext.encode("utf-8")).hexdigest()


    def search_listings(s, token):
        body = {
            "community_id_list": [SILVER_SPRINGS_COMMUNITY_ID],
            "house_type": ["all"],
            "area": CALGARY_BBOX,
            "list_type": [1],
            "listing_days": 0,
            "sold_days": 0,
            "page_num": 1,
            "page_size": 200,
            "lang": "en_US",
            "province": "AB",
            "type": "list",
        }
        ts = str(int(time.time()))
        body["ts"] = ts
        body["signature"] = sign(body, ts)
        r = s.post(
            f"{BASE}/search/mapsearchv3/list",
            json=body,
            headers={**AUTH_EXTRA, "authorization": f"Bearer {token}"},
            timeout=30,
        )
        r.raise_for_status()
        resp = r.json()
        if not resp.get("status"):
            raise RuntimeError(f"search rejected: {resp.get('error')}")
        return ((resp.get("data") or {}).get("list") or [])


    def is_silver_springs(house):
        cid = house.get("community_id") or house.get("community")
        try:
            return int(cid) == SILVER_SPRINGS_COMMUNITY_ID
        except (TypeError, ValueError):
            return False


    def normalize(item):
        id_listing = item.get("id_listing") or item.get("id") or ""
        return {
            "id": str(id_listing),
            "price": item.get("price_int") or item.get("list_price") or item.get("price") or 0,
            "beds": item.get("bedroom") or item.get("beds") or "?",
            "baths": item.get("bathroom") or item.get("baths") or "?",
            "address": item.get("address") or "",
            "url": f"https://housesigma.com/bkv2/landing/rootpage/listing?id_listing={id_listing}" if id_listing else "",
        }


    def fmt_price(p):
        if isinstance(p, (int, float)) and p:
            return f"${int(p):,}"
        return str(p) if p else "?"


    def render_row(l):
        return (
            "<tr>"
            f"<td><a href=\"{l['url']}\">{l['address']}</a></td>"
            f"<td>{fmt_price(l['price'])}</td>"
            f"<td>{l['beds']} bd</td>"
            f"<td>{l['baths']} ba</td>"
            "</tr>"
        )


    def render_email(new_listings):
        rows = "".join(render_row(l) for l in new_listings)
        return (
            "<html><body>"
            f"<p>{len(new_listings)} new Silver Springs listing(s):</p>"
            "<table border='1' cellpadding='6' cellspacing='0'>"
            "<tr><th>Address</th><th>Price</th><th>Beds</th><th>Baths</th></tr>"
            f"{rows}</table></body></html>"
        )


    def send_email(html, count):
        msg = MIMEMultipart("alternative")
        msg["Subject"] = f"Silver Springs: {count} new listing(s)"
        msg["From"] = SMTP_USER
        msg["To"] = SMTP_USER
        msg.attach(MIMEText(html, "html"))
        with smtplib.SMTP("smtp.gmail.com", 587) as srv:
            srv.starttls()
            srv.login(SMTP_USER, SMTP_PASSWORD)
            srv.send_message(msg)


    def load_seen():
        if not STATE.exists():
            return set()
        return set(json.loads(STATE.read_text()))


    def save_seen(ids):
        STATE.parent.mkdir(parents=True, exist_ok=True)
        STATE.write_text(json.dumps(sorted(ids)))


    def main():
        s = make_session()
        token = get_token(s)
        init_app(s, token)
        signin(s, token)
        raw = search_listings(s, token)
        print(f"search returned {len(raw)} listings")

        if os.environ.get("DEBUG_COMMUNITIES") and raw:
            print(f"first item keys: {sorted(raw[0].keys())[:30]}")
            community_counts = {}
            for item in raw:
                cid = item.get("community_id") or item.get("community") or "<none>"
                community_counts[cid] = community_counts.get(cid, 0) + 1
            for c, n in sorted(community_counts.items(), key=lambda x: -x[1]):
                print(f"  community: {c!r} ({n})")

        listings = [normalize(i) for i in raw if is_silver_springs(i)]
        listings = [l for l in listings if l["id"]]

        seen = load_seen()
        new = [l for l in listings if l["id"] not in seen]
        if new:
            send_email(render_email(new), len(new))
            print(f"emailed {len(new)} new (of {len(listings)} Silver Springs listings)")
        else:
            print(f"no new listings ({len(listings)} Silver Springs total)")
        save_seen(seen | {l["id"] for l in listings})


    if __name__ == "__main__":
        try:
            main()
        except Exception as e:
            sys.stderr.write(f"watcher failed: {e}\n")
            sys.exit(1)
