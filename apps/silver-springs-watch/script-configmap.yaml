apiVersion: v1
kind: ConfigMap
metadata:
  name: watcher-script
  namespace: silver-springs-watch
data:
  watcher.py: |
    #!/usr/bin/env python3
    """Hourly Calgary Silver Springs new-listing watcher.

    Auth flow against housesigma.com/bkv2/api:
      1. POST /init/accesstoken/new        -> bearer token
      2. POST /auth/user/signin            -> session cookies
      3. POST /search/mapsearchv3/list     -> listings (Silver Springs bbox)

    Diffs MLS / id_listing values against /state/seen.json (PVC-backed).
    Mails any net-new listings via Gmail SMTP.
    """
    import json
    import os
    import smtplib
    import sys
    from email.mime.multipart import MIMEMultipart
    from email.mime.text import MIMEText
    from pathlib import Path

    import requests

    HS_BASE = "https://housesigma.com/bkv2/api"
    HS_HEADERS = {
        "user-agent": (
            "Mozilla/5.0 (Windows NT 10.0; Win64; x64) "
            "AppleWebKit/537.36 (KHTML, like Gecko) "
            "Chrome/120.0.0.0 Safari/537.36"
        ),
        "origin": "https://housesigma.com",
        "referer": "https://housesigma.com/",
        "HS-Client-Type": "desktop_v7",
        "HS-Client-Version": "7.21.152",
        "content-type": "application/json",
    }

    SILVER_SPRINGS_BBOX = {
        "lat_min": 51.100,
        "lat_max": 51.135,
        "lng_min": -114.215,
        "lng_max": -114.160,
    }
    SILVER_SPRINGS_COMMUNITY = "silver springs"

    STATE = Path("/state/seen.json")
    SMTP_USER = "cjrfraser@gmail.com"
    SMTP_PASSWORD = os.environ["SMTP_PASSWORD"]
    HS_EMAIL = os.environ["HOUSE_SIGMA_EMAIL"]
    HS_PASSWORD = os.environ["HOUSE_SIGMA_PASSWORD"]


    def get_token(session):
        r = session.post(f"{HS_BASE}/init/accesstoken/new", json={}, timeout=15)
        r.raise_for_status()
        token = (r.json().get("data") or {}).get("access_token")
        if not token:
            raise RuntimeError(f"no access_token in response: {r.text[:300]}")
        return token


    def signin(session, token):
        r = session.post(
            f"{HS_BASE}/auth/user/signin",
            json={"email": HS_EMAIL, "password": HS_PASSWORD, "token": token},
            headers={"authorization": f"Bearer {token}"},
            timeout=15,
            allow_redirects=False,
        )
        r.raise_for_status()
        body = r.json()
        if body.get("status") and str(body["status"]).lower() not in ("ok", "success", "1", "true"):
            err = body.get("error") or body
            raise RuntimeError(f"signin rejected: {err}")


    def search(session, token, page_num=1, page_size=50):
        r = session.post(
            f"{HS_BASE}/search/mapsearchv3/list",
            json={
                "community_id_list": [],
                "house_type": [],
                "area": SILVER_SPRINGS_BBOX,
                "page_num": page_num,
                "page_size": page_size,
                "province": "AB",
                "city_id": "Calgary",
                "type": "list",
                "lang": "en_US",
            },
            headers={"authorization": f"Bearer {token}"},
            timeout=30,
        )
        r.raise_for_status()
        return ((r.json().get("data") or {}).get("list") or [])


    def is_silver_springs(item):
        community = (item.get("community") or item.get("community_name") or "").lower()
        if SILVER_SPRINGS_COMMUNITY in community:
            return True
        address = (item.get("address") or "").lower()
        return SILVER_SPRINGS_COMMUNITY in address


    def normalize(item):
        return {
            "id": str(item.get("id_listing") or item.get("mls_number") or item.get("mls") or ""),
            "price": item.get("list_price") or item.get("price") or 0,
            "beds": item.get("bedroom") or item.get("beds") or item.get("bedrooms") or "?",
            "baths": item.get("bathroom") or item.get("baths") or item.get("bathrooms") or "?",
            "address": item.get("address") or "",
            "url": (
                f"https://housesigma.com/bkv2/landing/rootpage/listing?id_listing={item['id_listing']}"
                if item.get("id_listing")
                else ""
            ),
        }


    def load_seen():
        if not STATE.exists():
            return set()
        return set(json.loads(STATE.read_text()))


    def save_seen(ids):
        STATE.parent.mkdir(parents=True, exist_ok=True)
        STATE.write_text(json.dumps(sorted(ids)))


    def fmt_price(p):
        if isinstance(p, (int, float)) and p:
            return f"${int(p):,}"
        return str(p) if p else "?"


    def render_row(l):
        return (
            "<tr>"
            f"<td><a href=\"{l['url']}\">{l['address']}</a></td>"
            f"<td>{fmt_price(l['price'])}</td>"
            f"<td>{l['beds']} bd</td>"
            f"<td>{l['baths']} ba</td>"
            "</tr>"
        )


    def render_email(new_listings):
        rows = "".join(render_row(l) for l in new_listings)
        return (
            "<html><body>"
            f"<p>{len(new_listings)} new Silver Springs listing(s):</p>"
            "<table border='1' cellpadding='6' cellspacing='0'>"
            "<tr><th>Address</th><th>Price</th><th>Beds</th><th>Baths</th></tr>"
            f"{rows}</table></body></html>"
        )


    def send_email(html, count):
        msg = MIMEMultipart("alternative")
        msg["Subject"] = f"Silver Springs: {count} new listing(s)"
        msg["From"] = SMTP_USER
        msg["To"] = SMTP_USER
        msg.attach(MIMEText(html, "html"))
        with smtplib.SMTP("smtp.gmail.com", 587) as s:
            s.starttls()
            s.login(SMTP_USER, SMTP_PASSWORD)
            s.send_message(msg)


    def main():
        session = requests.Session()
        session.headers.update(HS_HEADERS)
        token = get_token(session)
        signin(session, token)
        raw = search(session, token)
        listings = [normalize(i) for i in raw if is_silver_springs(i)]
        listings = [l for l in listings if l["id"]]
        seen = load_seen()
        new = [l for l in listings if l["id"] not in seen]
        if new:
            send_email(render_email(new), len(new))
            print(f"emailed {len(new)} new listing(s)")
        else:
            print(f"no new listings ({len(listings)} total in Silver Springs bbox)")
        save_seen(seen | {l["id"] for l in listings})


    if __name__ == "__main__":
        try:
            main()
        except Exception as e:
            sys.stderr.write(f"watcher failed: {e}\n")
            sys.exit(1)
