<?xml version="1.0" encoding="UTF-8"?>
<!-- Main floor plan traced from paper grid drawing. Scale: 1 ft = 10 mm. Origin = outer top-left corner. -->
<svg xmlns="http://www.w3.org/2000/svg" width="470mm" height="410mm" viewBox="-20 -20 470 410">
  <defs>
    <pattern id="hatch" width="2" height="2" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="2" stroke="#b9b9b9" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- ============ FLOOR TEXTURE AREAS (hatched on paper) ============ -->
  <g id="floor-areas" fill="url(#hatch)" stroke="#999999" stroke-width="0.4">
    <!-- kitchen cabinets/counters right of the x=20.5 wall -->
    <rect x="213" y="204" width="20" height="28"/>
    <rect x="213" y="261" width="19" height="12"/>
    <!-- south counter run: taller at left end, step up beside mudroom wall -->
    <path d="M 213 301 L 233 301 L 233 305 L 328 305 L 328 291 L 351 291 L 351 330 L 213 330 Z"/>
  </g>

  <!-- ============ KITCHEN ISLAND / COUNTER ============ -->
  <g id="island">
    <path d="M 275 187 L 320 187 L 320 251 L 293 251 L 293 214 L 275 214 Z"
          fill="url(#hatch)" stroke="#333333" stroke-width="1"/>
    <rect x="313" y="187" width="7" height="7" fill="#222222"/>
  </g>

  <!-- ============ FIREPLACE ============ -->
  <g id="fireplace">
    <rect x="413" y="70" width="17" height="65" fill="#3a3a3a"/>
  </g>

  <!-- ============ EXTERIOR WALLS (thick) ============ -->
  <g id="exterior-walls" stroke="#111111" stroke-width="2.5" fill="none" stroke-linecap="square">
    <!-- top of NW wing -->
    <polyline points="0,0 150,0 150,40"/>
    <!-- closet bottom wall / main top wall, west of door gap -->
    <line x1="110" y1="40" x2="160" y2="40"/>
    <!-- main top wall to nook -->
    <line x1="196" y1="40" x2="275" y2="40"/>
    <!-- main top wall, nook to NE corner, down east wall to bay -->
    <polyline points="370,40 430,40 430,165"/>
    <!-- east wall below bay, to SE corner, west along south wall to entry -->
    <polyline points="430,228 430,330 308,330"/>
    <!-- south wall west of entry, up west wall to origin -->
    <polyline points="254,330 0,330 0,0"/>
  </g>

  <!-- ============ INTERIOR WALLS (thick) ============ -->
  <g id="interior-walls" stroke="#111111" stroke-width="2.5" fill="none" stroke-linecap="square">
    <!-- NW wing: study closet at x=11ft (jamb stub at top, opening, wall below y=4) -->
    <line x1="110" y1="0" x2="110" y2="5"/>
    <line x1="110" y1="36" x2="110" y2="40"/>
    <line x1="110" y1="40" x2="110" y2="80"/>
    <line x1="110" y1="112" x2="110" y2="115"/>
    <!-- study south wall: continuous from west exterior to x=11, joined to stair step-down -->
    <line x1="0" y1="115" x2="110" y2="115"/>
    <polyline points="82,115 82,150 35,150 35,185"/>
    <!-- center small rooms ("H"): x=15ft and x=20.5ft with middle bar; inward door jambs at all four ends -->
    <line x1="150" y1="110" x2="150" y2="158"/>
    <line x1="205" y1="110" x2="205" y2="158"/>
    <line x1="150" y1="138" x2="205" y2="138"/>
    <line x1="150" y1="110" x2="157" y2="110"/>
    <line x1="205" y1="110" x2="198" y2="110"/>
    <line x1="150" y1="158" x2="157" y2="158"/>
    <line x1="205" y1="158" x2="198" y2="158"/>
    <!-- stub south from top wall at x=20.5ft -->
    <line x1="205" y1="40" x2="205" y2="65"/>
    <!-- bottom-left room: x=15ft and x=20.5ft walls, two cross walls, closet box -->
    <line x1="150" y1="192" x2="150" y2="305"/>
    <line x1="205" y1="192" x2="205" y2="330"/>
    <line x1="150" y1="265" x2="205" y2="265"/>
    <line x1="150" y1="280" x2="205" y2="280"/>
    <!-- bathroom door jamb below the parallel walls -->
    <line x1="178" y1="280" x2="178" y2="287"/>
    <polyline points="182,193 205,193"/>
    <polyline points="200,193 200,217 205,217"/>
    <!-- mudroom: north wall with L-jamb at door, west wall below door -->
    <polyline points="354,263 354,256 430,256"/>
    <line x1="354" y1="289" x2="354" y2="330"/>
  </g>

  <!-- ============ WINDOWS / GLAZED & THIN FEATURES ============ -->
  <g id="windows-openings" stroke="#777777" stroke-width="0.8" fill="none">
    <!-- doorway in top wall (x=16 to x=19.6) -->
    <line x1="160" y1="40" x2="196" y2="40"/>
    <!-- curved window nook, top wall -->
    <polyline points="275,40 298,28 315,23 337,23 354,28 370,40"/>
    <!-- angled window bay, east wall -->
    <polyline points="430,165 444,175 444,218 430,228"/>
    <!-- entry door span in south wall -->
    <line x1="254" y1="330" x2="308" y2="330"/>
  </g>

  <!-- ============ STAIRS (west side) ============ -->
  <g id="stairs" stroke="#555555" stroke-width="0.6" fill="none">
    <line x1="0" y1="155" x2="35" y2="155"/>
    <line x1="0" y1="160" x2="35" y2="160"/>
    <line x1="0" y1="165" x2="35" y2="165"/>
    <line x1="0" y1="170" x2="35" y2="170"/>
    <line x1="0" y1="175" x2="35" y2="175"/>
    <line x1="0" y1="180" x2="35" y2="180"/>
  </g>

  <!-- ============ ENTRY PORCH (south) ============ -->
  <g id="porch" stroke="#777777" stroke-width="0.8" fill="none">
    <polyline points="254,330 269,346 294,346 308,330"/>
    <line x1="269" y1="346" x2="294" y2="346"/>
  </g>
</svg>
